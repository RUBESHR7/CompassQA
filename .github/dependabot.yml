version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "dependencies"
    ignore:
      # ESLint 10 breaks eslint-config-next — ignore major upgrades
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # Next.js major upgrades need manual review
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
    groups:
      patch-updates:
        patterns: ["*"]
        update-types: ["patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "github-actions"
      - "dependencies"
