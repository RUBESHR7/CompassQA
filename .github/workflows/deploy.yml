name: Security Audit & Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-build:
    name: Security Audit & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check for exposed API keys in source
        run: |
          FOUND=$(grep -rn "AIzaSy" --include="*.js" --include="*.jsx" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git . || true)
          if [ -n "$FOUND" ]; then
            echo "WARNING: Possible API key found in source code!"
            echo "$FOUND"
            exit 1
          fi
          echo "No hardcoded API keys detected."

      - name: NPM Security Audit
        run: npm audit --audit-level=critical || true

      - name: Build Check
        run: npm run build
        env:
          GEMINI_API_KEY: build-check-only
          MISTRAL_API_KEY: build-check-only
          NEXT_TELEMETRY_DISABLED: 1
