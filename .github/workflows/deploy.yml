name: Security Audit & Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-build:
    name: Security Audit & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Check for secrets accidentally committed into source code
      - name: Check for exposed API keys
        run: |
          if grep -rn "AIzaSy" --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" . \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git; then
            echo "❌ WARNING: Possible API key found in source code!"
            exit 1
          fi
          echo "✅ No hardcoded API keys detected in source files."

      # Audit dependencies for known CVEs (report only, don't block)
      - name: NPM Security Audit
        run: npm audit --audit-level=critical || echo "⚠️ Non-critical vulnerabilities found - review recommended"

      # Verify the project builds successfully
      - name: Build
        run: npm run build
        env:
          # Dummy values for build-time check only — real keys are on Vercel
          GEMINI_API_KEY: build-check-only
          MISTRAL_API_KEY: build-check-only
