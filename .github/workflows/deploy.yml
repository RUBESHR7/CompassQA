name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Audit dependencies for known CVEs
      - name: NPM Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true  # Don't fail build on moderate issues, just report

      # Check for secrets accidentally committed
      - name: Check for exposed secrets
        run: |
          if grep -r "GEMINI_API_KEY=AI" --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" . --exclude-dir=node_modules --exclude-dir=.next; then
            echo "⚠️  WARNING: API key may be hardcoded in source. Please review."
            exit 1
          fi
          echo "✅ No hardcoded API keys detected"

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: security-audit
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Server-side only — NEVER use NEXT_PUBLIC_ for secret keys
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
